<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chi tiết khóa học</title>
    <link rel="stylesheet" href="detail_sources_style.css" />
    <link rel="stylesheet" href="../../../style/style.css" />
    <script defer src="detail_sources_script.js"></script>
</head>

<body>
    <nav class="sidebar">
        <h2>📊 Admin Menu</h2>
        <a href="../../../index.html">Home</a>
        <a href="../sources.html" class="selectedMenu">📚 Sources</a>
        <a href="../../users/user.html">👥 Users</a>
        <a href="../../schedule/schedule.html">📅 Schedule</a>
        <a href="../../staffs/staffs.html">🧑‍🏫 Staffs</a>
        <a href="../../word/word.html">� Words</a>
    </nav>

    <main class="main-content">
        <h1>Chi tiết khóa học</h1>
        <div class="dashboard-box">
            <div class="info">
                <div class="left-column">
                    <h2 id="source-title"></h2>
                    <img id="source-thumbnail" src="" alt="Ảnh khóa học"
                        style="width: 400px; height: 250px; border-radius: 10px; margin-bottom: 1rem;">

                    <label for="title-input"><strong>Tên khóa học:</strong></label>
                    <input type="text" id="title-input" />

                    <label for="category-input"><strong>Chuyên mục:</strong></label>
                    <input type="text" id="category-input" />

                    <label for="cost-input"><strong>Học phí ($):</strong></label>
                    <input type="number" id="cost-input" />

                    <label for="description-input"><strong>Mô tả:</strong></label>
                    <textarea id="description-input" rows="4"></textarea>

                    <label for="thumbnail-input"><strong>Ảnh khóa học (URL):</strong></label>
                    <input type="text" id="thumbnail-input" />

                    <label class="checkbox-label"><input type="checkbox" id="active-input" /> Hoạt động</label>

                    <button id="save-source-btn"> Lưu chỉnh sửa khóa học</button>
                    <div id="source-status" style="margin-top: 1rem; color: green;"></div>
                </div>
                <div class="right-column">
                    <h3>Danh sách bài học</h3>
                    <div id="lessons-container">
                        <!-- Danh sách bài học sẽ được render vào đây -->
                        <div id="lesson-form" style="display: none; margin-top: 1rem;">
                            <input type="text" id="new-title" placeholder="Tiêu đề bài học" />
                            <input type="text" id="new-youtube" placeholder="Link YouTube" />
                            <input type="text" id="new-description" placeholder="Mô tả" />
                            <input type="text" id="new-exercise" placeholder="Bài tập" />
                            <button id="submit-lesson">✅ Lưu bài học</button>
                        </div>

                        <button id="add-lesson-btn" style="margin-top: 1rem;">➕ Thêm bài học</button>
                    </div>
                </div>
            </div>
    </main>
</body>

</html>
